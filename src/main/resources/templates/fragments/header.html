<!-- ===================================================================
  HEADER FRAGMENT - Thanh điều hướng dùng chung cho tất cả các trang
  Sử dụng: th:replace="~{fragments/header :: navbar}"
  Thymeleaf Security: hiển thị menu khác nhau tùy đã đăng nhập hay chưa
  =================================================================== -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- Fragment navbar: thanh điều hướng trên cùng -->
<nav th:fragment="navbar" class="navbar">
    <!-- Logo / Tên shop -->
    <a href="/" class="navbar-brand"><i class="bi bi-shop"></i> DuongBinh Shop</a>

    <!-- Menu điều hướng -->
    <ul class="navbar-nav">
        <!-- Link Trang chủ - luôn hiển thị -->
        <li><a th:href="@{/}" class="nav-link"><i class="bi bi-house"></i> Trang chủ</a></li>

        <!-- ============ MENU KHI CHƯA ĐĂNG NHẬP ============ -->
        <li sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}" class="nav-link"><i class="bi bi-box-arrow-in-right"></i> Đăng nhập</a>
        </li>
        <li sec:authorize="!isAuthenticated()">
            <a th:href="@{/register}" class="nav-link"><i class="bi bi-person-plus"></i> Đăng ký</a>
        </li>

        <!-- ============ MENU KHI ĐÃ ĐĂNG NHẬP ============ -->
        <!-- Link giỏ hàng - chỉ hiện khi đã đăng nhập -->
        <li sec:authorize="isAuthenticated()">
            <a th:href="@{/cart}" class="nav-link"><i class="bi bi-cart3"></i> Giỏ hàng</a>
        </li>
        <!-- Link đơn hàng - chỉ hiện khi đã đăng nhập -->
        <li sec:authorize="isAuthenticated()">
            <a th:href="@{/orders}" class="nav-link"><i class="bi bi-receipt"></i> Đơn hàng</a>
        </li>
        <!-- Link hồ sơ cá nhân -->
        <li sec:authorize="isAuthenticated()">
            <a th:href="@{/profile}" class="nav-link"><i class="bi bi-person-circle"></i> Hồ sơ</a>
        </li>

        <!-- Link Admin - chỉ hiện khi là ADMIN -->
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/books}" class="nav-link" style="color: var(--primary); font-weight: 600;">
                <i class="bi bi-gear"></i> Admin
            </a>
        </li>

        <!-- Hiển thị tên user + Đăng xuất -->
        <li sec:authorize="isAuthenticated()">
            <span class="nav-link" style="color: #81C784;">
                <span sec:authentication="name">User</span>
            </span>
        </li>
        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="nav-link btn"
                    style="background:none; border:none; color:#EF9A9A; cursor:pointer;">
                    Đăng xuất
                </button>
            </form>
        </li>
    </ul>
</nav>

<!-- Toast thông báo thêm giỏ hàng (hiển thị trên MỌI trang) -->
<div th:if="${cartMessage}" class="toast-notification" id="cart-toast">
    <div class="toast-content">
        <i class="bi bi-cart-check-fill toast-icon"></i>
        <span th:text="${cartMessage}"></span>
    </div>
    <button class="toast-close" onclick="document.getElementById('cart-toast').remove()">
        <i class="bi bi-x"></i>
    </button>
</div>
<script th:if="${cartMessage}">
    setTimeout(function () {
        var toast = document.getElementById('cart-toast');
        if (toast) {
            toast.classList.add('toast-hide');
            setTimeout(function () { toast.remove(); }, 400);
        }
    }, 3000);
</script>

</html>
