<!-- ===================================================================
 TRANG HỒ SƠ CÁ NHÂN - profile.html
 Xem/sửa thông tin cá nhân và đổi mật khẩu.
 =================================================================== -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - DuongBinh Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <!-- Navbar -->
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="container">
        <h2 style="margin-bottom: 1.5rem;"><i class="bi bi-person-circle"></i> Hồ sơ cá nhân</h2>

        <!-- Thông báo thành công / lỗi -->
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="profile-layout">
            <!-- ============ FORM CẬP NHẬT THÔNG TIN ============ -->
            <div class="profile-card">
                <h3> Thông tin cá nhân</h3>
                <form th:action="@{/profile/update}" method="post">
                    <!-- CSRF token tự được Thymeleaf thêm -->

                    <div class="form-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" th:value="${user.username}" class="form-control" disabled>
                    </div>

                    <div class="form-group">
                        <label for="phone">Số điện thoại</label>
                        <input type="text" id="phone" name="phone" th:value="${user.phone}" class="form-control"
                            placeholder="Nhập số điện thoại">
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" th:value="${user.email}" class="form-control"
                            placeholder="Nhập email" required>
                    </div>

                    <div class="form-group">
                        <label>Đăng nhập qua</label>
                        <input type="text"
                            th:value="${user.provider == 'google' ? 'Tài khoản Google' : 'Thành viên cục bộ'}"
                            class="form-control" disabled>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">
                        Cập nhật thông tin
                    </button>
                </form>
            </div>

            <!-- ============ FORM ĐỔI MẬT KHẨU ============ -->
            <div class="profile-card">
                <h3> Đổi mật khẩu</h3>
                <form th:action="@{/profile/change-password}" method="post">

                    <div class="form-group">
                        <label for="currentPassword">Mật khẩu hiện tại *</label>
                        <input type="password" id="currentPassword" name="currentPassword" class="form-control"
                            placeholder="Nhập mật khẩu hiện tại" required>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">Mật khẩu mới *</label>
                        <input type="password" id="newPassword" name="newPassword" class="form-control"
                            placeholder="Nhập mật khẩu mới (≥ 6 ký tự)" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Xác nhận mật khẩu mới *</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                            placeholder="Nhập lại mật khẩu mới" required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">
                        Đổi mật khẩu
                    </button>
                </form>
            </div>
        </div>

        <!-- Nút quay lại -->
        <a th:href="@{/}" class="btn btn-secondary" style="margin-top: 1.5rem;">← Quay lại trang chủ</a>
    </div>

    <!-- Footer -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>

</html>
