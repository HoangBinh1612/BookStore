<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đơn hàng - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="container">
        <div class="admin-header">
            <h2 class="page-title"><i class="bi bi-receipt"></i> Quản lý Đơn hàng</h2>
            <div style="display:flex; gap:0.5rem;">
                <!-- Toolbar for switching pages -->
                <a th:href="@{/admin/books}" class="btn btn-secondary btn-sm"><i class="bi bi-bag"></i> Sách</a>
                <a th:href="@{/admin/statistics}" class="btn btn-secondary btn-sm"><i class="bi bi-bar-chart"></i> Thống
                    kê</a>
                <a th:href="@{/admin/inventory}" class="btn btn-secondary btn-sm"><i class="bi bi-box-seam"></i> Kho
                    hàng</a>
                <a th:href="@{/admin/categories}" class="btn btn-secondary btn-sm"><i class="bi bi-folder"></i> Danh
                    mục</a>
            </div>
        </div>

        <!-- Thông báo -->
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <!-- Bảng hóa đơn -->
        <div class="admin-table-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Khách hàng</th>
                        <th>Ngày đặt</th>
                        <th>Sản phẩm</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td><strong>#<span th:text="${order.id}"></span></strong></td>
                        <td>
                            <div th:if="${order.user != null}">
                                <strong th:text="${order.user.username}"></strong><br>
                                <span style="font-size: 0.85rem; color: #718096;" th:text="${order.user.email}"></span>
                            </div>
                            <span th:if="${order.user == null}" style="color: #a0aec0;">Khách vãng lai</span>
                        </td>
                        <td
                            th:text="${order.invoiceDate != null ? #dates.format(order.invoiceDate, 'dd/MM/yyyy HH:mm') : 'N/A'}">
                        </td>
                        <td>
                            <ul style="padding-left: 1.2rem; margin: 0; font-size: 0.9rem; color: #4a5568;">
                                <li th:each="item : ${order.itemInvoices}" style="margin-bottom: 0.2rem;">
                                    [[${item.book != null ? item.book.title : 'Sách đã xóa'}]] (x[[${item.quantity}]])
                                </li>
                            </ul>
                        </td>
                        <td style="font-weight: 600; color: #e53e3e;"
                            th:text="${#numbers.formatDecimal(order.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                        </td>
                        <td>
                            <span class="order-status"
                                th:classappend="${order.status == 'Đã thanh toán' ? 'status-paid' : 
                                                 (order.status == 'Chưa thanh toán' ? 'status-pending' : 
                                                 (order.status == 'Đang xử lý' ? 'status-processing' : 
                                                 (order.status == 'Đang giao hàng' ? 'status-shipping' : 
                                                 (order.status == 'Hoàn thành' ? 'status-completed' : 
                                                 (order.status == 'Đã hủy' ? 'status-cancelled' : 'status-default')))))}"
                                th:text="${order.status}">
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-secondary btn-sm"
                                style="margin-bottom:0.5rem; display:block; text-align:center;">
                                <i class="bi bi-eye"></i> Chi tiết
                            </a>
                            <form th:action="@{/admin/orders/update-status/{id}(id=${order.id})}" method="post"
                                style="display:flex; gap:0.5rem; align-items:center;">
                                <select name="status" class="form-control admin-input"
                                    style="padding: 0.3rem 0.5rem; font-size: 0.85rem;">
                                    <option value="Chua thanh toan"
                                        th:selected="${order.status == 'Chua thanh toan' or order.status == 'Chưa thanh toán'}">
                                        Chưa thanh toán</option>
                                    <option value="Da thanh toan"
                                        th:selected="${order.status == 'Da thanh toan' or order.status == 'Đã thanh toán'}">
                                        Đã thanh toán</option>
                                    <option value="Dang xu ly"
                                        th:selected="${order.status == 'Dang xu ly' or order.status == 'Đang xử lý'}">
                                        Đang xử lý</option>
                                    <option value="Dang giao hang"
                                        th:selected="${order.status == 'Dang giao hang' or order.status == 'Đang giao hàng'}">
                                        Đang giao hàng</option>
                                    <option value="Hoan thanh"
                                        th:selected="${order.status == 'Hoan thanh' or order.status == 'Hoàn thành'}">
                                        Hoàn thành</option>
                                    <option value="Da huy"
                                        th:selected="${order.status == 'Da huy' or order.status == 'Đã hủy'}">Đã hủy
                                    </option>
                                </select>
                                <button type="submit" class="btn btn-outline btn-sm">Cập nhật</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${orders == null || orders.isEmpty()}">
                        <td colspan="7" style="text-align:center; color:#718096; padding: 2rem;">Chưa có đơn hàng nào
                            trên hệ thống.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <style>
        .order-status {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-paid {
            background-color: #c6f6d5;
            color: #22543f;
        }

        .status-pending {
            background-color: #feebc8;
            color: #744210;
        }

        .status-processing {
            background-color: #bee3f8;
            color: #2a4365;
        }

        .status-shipping {
            background-color: #e9d8fd;
            color: #44337a;
        }

        .status-completed {
            background-color: #c6f6d5;
            color: #276749;
            border: 1px solid #48bb78;
        }

        .status-cancelled {
            background-color: #fed7d7;
            color: #742a2a;
        }

        .status-default {
            background-color: #edf2f7;
            color: #2d3748;
        }
    </style>
</body>

</html>
