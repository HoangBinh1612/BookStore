<!-- ===================================================================
 ADMIN - QUẢN LÝ DANH MỤC - admin/categories.html
 Hiển thị danh sách danh mục + form thêm/sửa trên cùng 1 trang
 =================================================================== -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Quản lý danh mục - Admin</title>
 <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
 <nav th:replace="~{fragments/header :: navbar}"></nav>

 <div class="container">
 <div class="admin-header">
 <h2 class="page-title"><i class="bi bi-folder"></i> Quản lý Danh mục</h2>
 <div style="display:flex; gap:0.5rem;">
 <a th:href="@{/admin/statistics}" class="btn btn-secondary btn-sm"><i class="bi bi-bar-chart"></i> Thống kê</a>
 <a th:href="@{/admin/products}" class="btn btn-secondary btn-sm"><i class="bi bi-bag"></i> Quản lý Sản phẩm</a>
 </div>
 </div>

 <!-- Thông báo -->
 <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
 <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

 <div class="admin-layout">
 <!-- Cột trái: Form thêm / sửa -->
 <div class="admin-form-card">
 <h3 th:text="${category.id != null ? ' Sửa danh mục' : ' Thêm danh mục mới'}"></h3>
 <form th:action="@{/admin/categories/save}" method="post" th:object="${category}">
 <!-- Hidden ID (khi sửa) -->
 <input type="hidden" th:field="*{id}">

 <div class="form-group">
 <label for="name">Tên danh mục</label>
 <input type="text" id="name" th:field="*{name}" class="form-control admin-input"
 th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
 placeholder="Nhập tên danh mục">
 <span th:if="${#fields.hasErrors('name')}" class="error-message" th:errors="*{name}"></span>
 </div>

 <div style="display: flex; gap: 0.5rem;">
 <button type="submit" class="btn btn-primary">
 <span th:text="${category.id != null ? 'Cập nhật' : 'Thêm mới'}"></span>
 </button>
 <a th:if="${category.id != null}" th:href="@{/admin/categories}"
 class="btn btn-secondary">Hủy</a>
 </div>
 </form>
 </div>

 <!-- Cột phải: Danh sách danh mục -->
 <div class="admin-table-card">
 <h3> Danh sách danh mục (<span th:text="${#lists.size(categories)}"></span>)</h3>
 <table class="admin-table">
 <thead>
 <tr>
 <th>ID</th>
 <th>Tên danh mục</th>
 <th>Thao tác</th>
 </tr>
 </thead>
 <tbody>
 <tr th:each="cat : ${categories}">
 <td th:text="${cat.id}"></td>
 <td th:text="${cat.name}"></td>
 <td>
 <div class="table-actions">
 <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
 class="btn btn-outline btn-sm"><i class="bi bi-pencil"></i> Sửa</a>
 <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}"
 class="btn btn-danger btn-sm" onclick="return confirm('Xóa danh mục này?')">
 <i class="bi bi-trash"></i> Xóa</a>
 </div>
 </td>
 </tr>
 <tr th:if="${#lists.size(categories) == 0}">
 <td colspan="3" style="text-align:center; color:#718096;">Chưa có danh mục nào.</td>
 </tr>
 </tbody>
 </table>
 </div>
 </div>
 </div>

 <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>

</html>
