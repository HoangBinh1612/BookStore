<!-- ===================================================================
 ADMIN - DANH SÁCH SẢN PHẨM - admin/products.html
 Bảng sản phẩm với tìm kiếm, nút thêm/sửa/xóa
 =================================================================== -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="container">
        <div class="admin-header">
            <h2 class="page-title"><i class="bi bi-bag"></i> Quản lý Sản phẩm</h2>
            <div style="display:flex; gap:0.5rem;">
                <a th:href="@{/admin/statistics}" class="btn btn-secondary btn-sm"><i class="bi bi-bar-chart"></i> Thống
                    kê</a>
                <a th:href="@{/admin/inventory}" class="btn btn-secondary btn-sm"><i class="bi bi-box-seam"></i> Kho
                    hàng</a>
                <a th:href="@{/admin/categories}" class="btn btn-secondary btn-sm"><i class="bi bi-folder"></i> Danh
                    mục</a>
                <a th:href="@{/admin/orders}" class="btn btn-secondary btn-sm"><i class="bi bi-receipt"></i> Đơn
                    hàng</a>
                <a th:href="@{/admin/books/add}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Thêm sách mới</a>
            </div>
        </div>

        <!-- Thông báo -->
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <!-- Tìm kiếm -->
        <div class="search-filter-bar">
            <form th:action="@{/admin/books}" method="get" class="search-form">
                <input type="text" name="keyword" th:value="${keyword}" class="search-input"
                    placeholder="Tìm sản phẩm...">
                <button type="submit" class="btn btn-primary btn-sm">Tìm</button>
                <a th:if="${keyword != null}" th:href="@{/admin/books}" class="btn btn-secondary btn-sm"><i
                        class="bi bi-x-lg"></i> Xóa lọc</a>
            </form>
        </div>

        <!-- Bảng sản phẩm -->
        <div class="admin-table-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ảnh</th>
                        <th>Tên sách</th>
                        <th>Tác giả</th>
                        <th>Danh mục</th>
                        <th>Giá</th>
                        <th>Tồn kho</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${bookPage.content}">
                        <td th:text="${product.id}"></td>
                        <td>
                            <img th:if="${product.imageUrl != null && !product.imageUrl.isEmpty()}"
                                th:src="${product.imageUrl}" alt="Cover"
                                style="height: 50px; width: 40px; object-fit: cover; border-radius: 4px; border: 1px solid #e2e8f0;">
                            <div th:unless="${product.imageUrl != null && !product.imageUrl.isEmpty()}"
                                style="height: 50px; width: 40px; background-color: #e2e8f0; border-radius: 4px; display:flex; align-items:center; justify-content:center; color:#a0aec0; font-size: 0.7rem;">
                                NO IMG</div>
                        </td>
                        <td th:text="${product.title}"></td>
                        <td th:text="${product.author != null ? product.author : '—'}"></td>
                        <td th:text="${product.category != null ? product.category.name : '—'}"></td>
                        <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                        <!-- Tồn kho - Badges giống Shopify/Lazada -->
                        <td>
                            <!-- Còn nhiều hàng (> 10) -->
                            <span th:if="${product.stock != null && product.stock > 10}" class="stock-badge stock-in">
                                Còn hàng
                            </span>
                            <!--Sắp hết (1-10) -->
                            <span th:if="${product.stock != null && product.stock > 0 && product.stock <= 10}"
                                class="stock-badge stock-low">
                                Sắp hết
                            </span>
                            <!-- Hết hàng (0 hoặc null) -->
                            <span th:if="${product.stock == null || product.stock <= 0}" class="stock-badge stock-out">
                                Hết hàng
                            </span>
                            <!-- Số lượng cụ thể -->
                            <div class="stock-qty" th:text="${product.stock != null ? product.stock : 0} + ' sp'"></div>
                        </td>
                        <td>
                            <div class="table-actions">
                                <a th:href="@{/admin/books/edit/{id}(id=${product.id})}"
                                    class="btn btn-outline btn-sm"><i class="bi bi-pencil"></i> Sửa</a>
                                <a th:href="@{/admin/books/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Xóa sách này chứ?')">
                                    <i class="bi bi-trash"></i> Xóa</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${bookPage.content.size() == 0}">
                        <td colspan="7" style="text-align:center; color:#718096;">Không tìm thấy sách.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Phân trang -->
        <div class="pagination" th:if="${bookPage.totalPages > 1}">
            <a th:if="${currentPage > 0}" th:href="@{/admin/books(keyword=${keyword}, page=${currentPage - 1})}"
                class="page-link">← Trước</a>
            <span th:each="i : ${#numbers.sequence(0, bookPage.totalPages - 1)}">
                <a th:if="${i != currentPage}" th:href="@{/admin/books(keyword=${keyword}, page=${i})}"
                    class="page-link" th:text="${i + 1}"></a>
                <span th:if="${i == currentPage}" class="page-link active" th:text="${i + 1}"></span>
            </span>
            <a th:if="${currentPage < bookPage.totalPages - 1}"
                th:href="@{/admin/books(keyword=${keyword}, page=${currentPage + 1})}" class="page-link">Sau →</a>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>

</html>
