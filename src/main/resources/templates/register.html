<!-- ===================================================================
 TRANG ĐĂNG KÝ - register.html
 Luồng: User điền form → POST /register → AuthController xử lý
 Validate: kiểm tra trống, email format, password length, confirm match
 Nếu thành công → redirect /login với thông báo
 =================================================================== -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - DuongBinh Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Tiêu đề -->
            <h2> Đăng ký</h2>
            <p class="subtitle">Tạo tài khoản mới để mua sắm</p>

            <!-- Form đăng ký - bind với RegisterDTO -->
            <form th:action="@{/register}" method="post" th:object="${registerDTO}">

                <!-- Username -->
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control"
                        th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                        placeholder="Nhập tên đăng nhập (3-50 ký tự)">
                    <!-- Hiển thị lỗi validation cho username -->
                    <span th:if="${#fields.hasErrors('username')}" class="error-message" th:errors="*{username}"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control"
                        th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="Nhập email">
                    <span th:if="${#fields.hasErrors('email')}" class="error-message" th:errors="*{email}"></span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control"
                        th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                        placeholder="Nhập mật khẩu (ít nhất 6 ký tự)">
                    <span th:if="${#fields.hasErrors('password')}" class="error-message" th:errors="*{password}"></span>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                        th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                        placeholder="Nhập lại mật khẩu">
                    <span th:if="${#fields.hasErrors('confirmPassword')}" class="error-message"
                        th:errors="*{confirmPassword}"></span>
                </div>

                <!-- Nút đăng ký -->
                <button type="submit" class="btn btn-primary btn-block">
                    Đăng ký tài khoản
                </button>
            </form>

            <!-- Nut dang nhap bang Google -->
            <div class="social-divider">
                <span>hoặc</span>
            </div>
            <a href="/oauth2/authorization/google" class="btn btn-google btn-block">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48"
                    style="margin-right:8px;vertical-align:middle">
                    <path fill="#FFC107"
                        d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z" />
                    <path fill="#FF3D00"
                        d="m6.3 14.7 6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" />
                    <path fill="#4CAF50"
                        d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.2 0-9.7-3.3-11.3-8L6 33.1C9.4 39.6 16.2 44 24 44z" />
                    <path fill="#1976D2"
                        d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.3 5.6l6.2 5.2C41.7 35.9 44 30.4 44 24c0-1.3-.1-2.6-.4-3.9z" />
                </svg>
                Đăng nhập với Google
            </a>

            <!-- Link đăng nhập -->
            <div class="auth-footer">
                Đã có tài khoản?
                <a th:href="@{/login}">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
</body>

</html>
