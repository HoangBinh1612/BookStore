<!-- ===================================================================
 TRANG CHỦ - home.html
 Hiển thị danh sách sách với:
 - Thanh tìm kiếm theo tên
 - Dropdown lọc theo danh mục
 - Lưới sách (book cards)
 - Phân trang (pagination)
 =================================================================== -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - DuongBinh BookStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <!-- ============ NAVBAR ============ -->
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="container">
        <!-- ============ HERO BANNER ============ -->
        <div class="hero-banner">
            <h1>Chào mừng đến DuongBinh BookStore</h1>
            <p>Khám phá sách hay — Giá tốt nhất — Giao hàng nhanh chóng</p>
        </div>

        <!-- ============ THANH TÌM KIẾM + LỌC ============ -->
        <div class="filter-panel">
            <form th:action="@{/}" method="get" class="filter-form">
                <!-- Row 1: Tìm kiếm + Danh mục -->
                <div class="filter-row">
                    <div class="filter-group filter-search">
                        <label><i class="bi bi-search"></i> Tìm kiếm</label>
                        <input type="text" name="keyword" th:value="${keyword}" class="filter-input"
                            placeholder="Nhập tên sách hoặc tác giả...">
                    </div>
                    <div class="filter-group filter-category">
                        <label><i class="bi bi-grid"></i> Danh mục</label>
                        <select name="categoryId" class="filter-input">
                            <option value="">Tất cả danh mục</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${categoryId != null && categoryId == cat.id}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Row 2: Khoảng giá + Nút -->
                <div class="filter-row">
                    <div class="filter-group filter-price">
                        <label><i class="bi bi-cash-stack"></i> Khoảng giá</label>
                        <div class="price-range-wrapper">
                            <div class="price-field">
                                <span class="price-prefix">₫</span>
                                <input type="number" name="minPrice" th:value="${minPrice}"
                                    class="filter-input price-val" placeholder="Từ" min="0" step="10000">
                            </div>
                            <span class="price-separator">—</span>
                            <div class="price-field">
                                <span class="price-prefix">₫</span>
                                <input type="number" name="maxPrice" th:value="${maxPrice}"
                                    class="filter-input price-val" placeholder="Đến" min="0" step="10000">
                            </div>
                        </div>
                    </div>

                    <!-- Quick price buttons -->
                    <div class="filter-group filter-quick">
                        <label><i class="bi bi-lightning"></i> Nhanh</label>
                        <div class="quick-price-btns">
                            <button type="button" class="quick-btn" onclick="setPrice(0,500000)">Dưới 500K</button>
                            <button type="button" class="quick-btn" onclick="setPrice(500000,2000000)">500K-2M</button>
                        </div>
                    </div>

                    <!-- Lọc Sắp xếp -->
                    <div class="filter-group filter-sort">
                        <label><i class="bi bi-sort-down"></i> Sắp xếp</label>
                        <select name="sort" class="filter-input" onchange="this.form.submit()">
                            <option value="">Mới nhất</option>
                            <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá: Thấp đến Cao</option>
                            <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá: Cao đến Thấp</option>
                        </select>
                    </div>

                    <div class="filter-actions">
                        <button type="submit" class="btn btn-primary filter-submit-btn">
                            <i class="bi bi-search"></i> Tìm kiếm
                        </button>
                        <a th:if="${keyword != null || categoryId != null || minPrice != null || maxPrice != null}"
                            th:href="@{/}" class="btn btn-outline filter-clear-btn">
                            <i class="bi bi-x-lg"></i> Xóa lọc
                        </a>
                    </div>
                </div>
            </form>
        </div>

        <script>
            function setPrice(min, max) {
                document.querySelector('input[name="minPrice"]').value = min || '';
                document.querySelector('input[name="maxPrice"]').value = max || '';
                document.querySelector('.filter-form').submit();
            }
        </script>

        <!-- ============ THÔNG TIN KẾT QUẢ ============ -->
        <div class="results-info">
            <span
                th:text="'Hiển thị ' + ${books != null ? #lists.size(books) : 0} + ' / ' + ${totalItems} + ' sách'"></span>
            <span th:if="${keyword != null && !keyword.isEmpty()}"
                th:text="' — Tìm kiếm: &quot;' + ${keyword} + '&quot;'"></span>
        </div>

        <!-- ============ LƯỚI SÁCH ============ -->
        <div class="product-grid" th:if="${books != null && #lists.size(books) > 0}">
            <!-- Lặp qua từng sách -->
            <div class="product-card" th:each="book : ${books}">
                <!-- Ảnh sách - click để xem chi tiết -->
                <a th:href="@{/books/{id}(id=${book.id})}" style="display:block; text-decoration:none;">
                    <div class="product-image"
                        style="position:relative; aspect-ratio: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f8fafc;">
                        <img th:if="${book.imageUrl != null && !book.imageUrl.isEmpty()}" th:src="${book.imageUrl}"
                            th:alt="${book.title}" style="width: 100%; height: 100%; object-fit: cover;">
                        <i th:unless="${book.imageUrl != null && !book.imageUrl.isEmpty()}"
                            class="bi bi-book text-muted" style="font-size: 4rem; color: #cbd5e0;"></i>
                    </div>
                </a>
                <div class="product-info">
                    <!-- Tên danh mục -->
                    <span class="product-category"
                        th:text="${book.category != null ? book.category.name : 'Chưa phân loại'}">
                    </span>
                    <!-- Tên sách - click để xem chi tiết -->
                    <h3 class="product-name">
                        <a th:href="@{/books/{id}(id=${book.id})}" th:text="${book.title}"
                            style="color: inherit; text-decoration: none;">Tên sách</a>
                    </h3>
                    <!-- Tác giả -->
                    <p style="color:#888; font-size:0.85em; margin:2px 0;" th:text="'Tác giả: ' + ${book.author}"></p>
                    <!-- Giá -->
                    <p class="product-price"
                        th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                    </p>
                </div>
                <!-- Nút thêm vào giỏ -->
                <div class="product-actions">
                    <a th:href="@{/cart/add/{id}(id=${book.id})}" class="btn btn-primary btn-sm btn-block">
                        Thêm vào giỏ
                    </a>
                </div>
            </div>
        </div>

        <!-- ============ KHÔNG CÓ SÁCH ============ -->
        <div class="empty-state" th:if="${books == null || #lists.size(books) == 0}">
            <h3>Không tìm thấy sách nào</h3>
            <p th:if="${keyword != null}"
                th:text="'Không có kết quả cho &quot;' + ${keyword} + '&quot;. Thử từ khóa khác?'"></p>
            <a th:href="@{/}" class="btn btn-outline">← Về trang chủ</a>
        </div>

        <!-- ============ PHÂN TRANG ============ -->
        <div class="pagination" th:if="${totalPages > 1}">
            <!-- Nút Previous -->
            <a th:if="${currentPage > 0}"
                th:href="@{/(keyword=${keyword}, categoryId=${categoryId}, minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort}, page=${currentPage - 1})}"
                class="page-link">← Trước</a>
            <span th:if="${currentPage == 0}" class="page-link disabled">← Trước</span>

            <!-- Các số trang -->
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:if="${i != currentPage}"
                    th:href="@{/(keyword=${keyword}, categoryId=${categoryId}, minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort}, page=${i})}"
                    class="page-link" th:text="${i + 1}"></a>
                <span th:if="${i == currentPage}" class="page-link active" th:text="${i + 1}"></span>
            </span>

            <!-- Nút Next -->
            <a th:if="${currentPage < totalPages - 1}"
                th:href="@{/(keyword=${keyword}, categoryId=${categoryId}, minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort}, page=${currentPage + 1})}"
                class="page-link">Sau →</a>
            <span th:if="${currentPage >= totalPages - 1}" class="page-link disabled">Sau →</span>
        </div>
    </div>

    <!-- ============ FOOTER ============ -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>

</html>
