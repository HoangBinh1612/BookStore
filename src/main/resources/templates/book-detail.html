<!-- ===================================================================
 CHI TIẾT SÁCH - book-detail.html
 Hiển thị thông tin chi tiết của 1 cuốn sách:
 - Ảnh bìa sách (lớn)
 - Thông tin: Tên, Tác giả, Danh mục, Giá, Tồn kho
 - Nút Thêm vào giỏ hàng
 =================================================================== -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.title} + ' - DuongBinh BookStore'">Chi tiết sách</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* ====== Layout chi tiết sách ====== */
        .book-detail-wrapper {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2.5rem;
            align-items: start;
            margin: 2.5rem 0;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
            padding: 2.5rem;
        }

        /* Ảnh bìa sách */
        .book-cover-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .book-cover-img {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .book-cover-placeholder {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e0 100%);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #a0aec0;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .book-cover-placeholder i {
            font-size: 4rem;
            margin-bottom: 0.5rem;
        }

        .book-cover-placeholder span {
            font-size: 0.85rem;
        }

        /* Thông tin sách */
        .book-info-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .book-category-badge {
            display: inline-block;
            background: var(--primary-light, #FFF3E0);
            color: var(--primary, #E65100);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: fit-content;
        }

        .book-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1a202c;
            line-height: 1.3;
            margin: 0;
        }

        .book-author {
            font-size: 1rem;
            color: #718096;
            margin: 0;
        }

        .book-author strong {
            color: #4a5568;
        }

        .book-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary, #E65100);
            margin: 0.5rem 0;
        }

        .book-stock-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .stock-in {
            background: #f0fff4;
            color: #276749;
        }

        .stock-low {
            background: #FFFDE7;
            color: #856404;
        }

        .stock-out {
            background: #fff5f5;
            color: #c53030;
        }

        .book-divider {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 0.5rem 0;
        }

        /* Form thêm giỏ hàng */
        .add-cart-form {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .qty-control {
            display: flex;
            align-items: center;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }

        .qty-btn {
            background: #f7fafc;
            border: none;
            width: 36px;
            height: 36px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #4a5568;
            transition: background 0.2s;
        }

        .qty-btn:hover {
            background: #e2e8f0;
        }

        .qty-input {
            width: 48px;
            height: 36px;
            border: none;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: #2d3748;
            outline: none;
        }

        /* Nút quay lại */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #718096;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary, #E65100);
        }

        @media (max-width: 768px) {
            .book-detail-wrapper {
                grid-template-columns: 1fr;
                padding: 1.5rem;
            }

            .book-cover-section {
                align-items: center;
            }

            .book-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="container">
        <!-- Breadcrumb quay lại -->
        <a href="/" class="back-link">
            <i class="bi bi-arrow-left"></i> Quay lại trang chủ
        </a>

        <!-- Thông báo (nếu vừa thêm vào giỏ) -->
        <div th:if="${cartMessage}" class="alert alert-success" th:text="${cartMessage}"></div>

        <!-- Khu vực chi tiết sách chính -->
        <div class="book-detail-wrapper">

            <!-- Cột trái: ảnh bìa -->
            <div class="book-cover-section">
                <!-- Ảnh thật nếu có -->
                <img th:if="${book.imageUrl != null && !book.imageUrl.isEmpty()}" th:src="${book.imageUrl}"
                    th:alt="${book.title}" class="book-cover-img">
                <!-- Placeholder nếu không có ảnh -->
                <div th:unless="${book.imageUrl != null && !book.imageUrl.isEmpty()}" class="book-cover-placeholder">
                    <i class="bi bi-book"></i>
                    <span>Chưa có ảnh bìa</span>
                </div>
            </div>

            <!-- Cột phải: thông tin sách -->
            <div class="book-info-section">

                <!-- Danh mục -->
                <span class="book-category-badge"
                    th:text="${book.category != null ? book.category.name : 'Chưa phân loại'}">
                    Thể loại
                </span>

                <!-- Tên sách -->
                <h1 class="book-title" th:text="${book.title}">Tên Sách</h1>

                <!-- Tác giả -->
                <p class="book-author">
                    <i class="bi bi-person"></i>
                    Tác giả: <strong th:text="${book.author != null ? book.author : 'Chưa rõ'}">Tác giả</strong>
                </p>

                <hr class="book-divider">

                <!-- Giá bán -->
                <p class="book-price" th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                    0 ₫
                </p>

                <!-- Trạng thái tồn kho -->
                <div>
                    <span th:if="${book.stock != null && book.stock > 10}" class="book-stock-badge stock-in">
                        <i class="bi bi-check-circle-fill"></i> Còn hàng (<span th:text="${book.stock}"></span> quyển)
                    </span>
                    <span th:if="${book.stock != null && book.stock > 0 && book.stock <= 10}"
                        class="book-stock-badge stock-low">
                        <i class="bi bi-exclamation-triangle-fill"></i> Sắp hết hàng (<span
                            th:text="${book.stock}"></span> quyển)
                    </span>
                    <span th:if="${book.stock == null || book.stock <= 0}" class="book-stock-badge stock-out">
                        <i class="bi bi-x-circle-fill"></i> Hết hàng
                    </span>
                </div>

                <hr class="book-divider">

                <!-- Form thêm vào giỏ hàng -->
                <div th:if="${book.stock != null && book.stock > 0}">
                    <a th:href="@{/cart/add/{id}(id=${book.id})}" class="btn btn-primary"
                        style="min-width: 200px; padding: 12px 24px; font-size: 1rem;">
                        <i class="bi bi-cart-plus"></i> Thêm vào giỏ hàng
                    </a>
                </div>

                <!-- Thông báo hết hàng -->
                <div th:if="${book.stock == null || book.stock <= 0}">
                    <button class="btn btn-secondary" disabled
                        style="min-width: 200px; padding: 12px 24px; font-size: 1rem; opacity: 0.6;">
                        <i class="bi bi-cart-x"></i> Tạm hết hàng
                    </button>
                </div>

            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>

</html>
