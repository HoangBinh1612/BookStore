<!-- ===================================================================
 TRANG ĐĂNG NHẬP - login.html
 Luồng: User nhập username + password → Spring Security xử lý POST /login
 Nếu đúng → redirect về trang chủ
 Nếu sai → hiện thông báo lỗi
 =================================================================== -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - DuongBinh Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Tiêu đề -->
            <h2> Đăng nhập</h2>
            <p class="subtitle">Chào mừng bạn quay trở lại!</p>

            <!-- Thông báo đăng ký thành công (từ redirect) -->
            <div th:if="${successMessage}" class="alert alert-success">
                <span th:text="${successMessage}"></span>
            </div>

            <!-- Thông báo đăng xuất thành công -->
            <div th:if="${param.logout}" class="alert alert-info">
                Bạn đã đăng xuất thành công.
            </div>

            <!-- Thông báo đăng nhập thất bại -->
            <div th:if="${param.error}" class="alert alert-danger">
                Tên đăng nhập hoặc mật khẩu không đúng!
            </div>

            <!-- Form đăng nhập - POST đến /login do Spring Security xử lý -->
            <form th:action="@{/login}" method="post">
                <!-- Username -->
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" class="form-control"
                        placeholder="Nhập tên đăng nhập" required autofocus>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Nhập mật khẩu" required>
                </div>

                <!-- Nút đăng nhập -->
                <button type="submit" class="btn btn-primary btn-block">
                    Đăng nhập
                </button>
            </form>

            <!-- Dưới form: nút đăng nhập bằng Google -->
            <div class="social-divider">
                <span>hoặc</span>
            </div>
            <a href="/oauth2/authorization/google" class="btn btn-google btn-block">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48"
                    style="margin-right:8px;vertical-align:middle">
                    <path fill="#FFC107"
                        d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z" />
                    <path fill="#FF3D00"
                        d="m6.3 14.7 6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" />
                    <path fill="#4CAF50"
                        d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.2 0-9.7-3.3-11.3-8L6 33.1C9.4 39.6 16.2 44 24 44z" />
                    <path fill="#1976D2"
                        d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.3 5.6l6.2 5.2C41.7 35.9 44 30.4 44 24c0-1.3-.1-2.6-.4-3.9z" />
                </svg>
                Đăng nhập với Google
            </a>

            <!-- Link đăng ký -->
            <div class="auth-footer">
                Chưa có tài khoản?
                <a th:href="@{/register}">Đăng ký ngay</a>
            </div>
        </div>
    </div>
</body>

</html>
