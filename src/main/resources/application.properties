# ===================================================================
# CẤU HÌNH ỨNG DỤNG - Website Bán Sách (Bookstore)
# HoangDuongBinh - Đồ án J2EE
# ===================================================================

# --- Cấu hình Server ---
server.port=8080

# --- Cấu hình kết nối MySQL (XAMPP) ---
spring.datasource.url=jdbc:mysql://localhost:3306/bookstore?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Cấu hình JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Cấu hình Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- Tên ứng dụng ---
spring.application.name=HoangDuongBinhProject

# ===================================================================
# CẤU HÌNH OAUTH2 GOOGLE
# Hướng dẫn lấy client-id và client-secret:
# 1. Vào https://console.cloud.google.com/
# 2. Tạo project mới → APIs & Services → Credentials
# 3. Create OAuth 2.0 Client ID
# 4. Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
# 5. Copy Client ID và Client Secret paste vào đây
# ===================================================================
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

